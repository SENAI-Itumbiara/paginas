<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vampire Survivors - Evoluções</title><style>
:root{--bg:#110d16;--panel:#1b1424;--card:#261a32;--line:#5d476e;--gold:#f4c85a;--txt:#f4e9d4;--muted:#baa8c8;--red:#a62535}*{box-sizing:border-box}body{margin:0;font-family:system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#342042,#0c0910 70%);color:var(--txt)}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:22px;background:#130e1b;border-right:2px solid #332342;overflow:auto}.logo{font-size:25px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:8px}.sub{color:var(--muted);font-size:13px;margin-bottom:20px}.btn{width:100%;display:flex;justify-content:space-between;gap:8px;margin:7px 0;padding:12px 14px;border:1px solid #463456;background:#20172a;color:var(--txt);border-radius:12px;cursor:pointer;text-align:left;font-weight:700}.btn.active,.btn:hover{background:#3a2346;border-color:var(--gold);box-shadow:0 0 0 1px #000 inset}.count{color:var(--gold)}main{padding:28px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}.title h1{margin:0;color:var(--gold);font-size:32px}.title p{margin:6px 0 0;color:var(--muted)}input{min-width:260px;max-width:520px;width:40vw;padding:13px 16px;border-radius:12px;border:1px solid #5b456d;background:#160f20;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}.card{background:linear-gradient(180deg,#2d2038,#1d1427);border:1px solid #513d61;border-radius:16px;padding:14px;box-shadow:0 8px 20px #0006}.combo{display:grid;grid-template-columns:1fr 24px 1fr 24px 1fr;gap:8px;align-items:center}.item{text-align:center;min-width:0}.frame{width:58px;height:58px;margin:0 auto 6px;border:3px solid #c29b51;background:#09070c;border-radius:6px;display:grid;place-items:center;box-shadow:inset 0 0 0 2px #36241d}.frame img{width:46px;height:46px;object-fit:contain;image-rendering:pixelated}.name{font-size:13px;font-weight:800;overflow-wrap:anywhere}.op{font-size:24px;font-weight:900;color:var(--gold);text-align:center}.evo .frame{border-color:#d25052}.evo .name{color:#ffd67a}.badge{display:inline-block;margin-bottom:9px;color:#d6c3e2;font-size:12px}.empty{color:var(--muted);padding:30px}.note{margin-top:20px;font-size:12px;color:#9988a8}a{color:#ffd56a}@media(max-width:780px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.grid{grid-template-columns:1fr}input{width:100%;min-width:0}.combo{grid-template-columns:1fr}.op{transform:rotate(90deg)}}

 ["Iron Ball", "Armor", "Wrecking Ball"], ["Silver Revolver", "Karoma's Mana", "Jewel Gun"], ["Hand Grenade", "Candelabrador", "The RPG"], ["Wine Glass", "Tirajisú", "Meal Ticket"], ["Raging Fire", "Spinach", "Salamender"], ["Ice Fang", "Spellbinder", "Cocytus"], ["Gale Force", "Bracer", "Pneuma Tempestas"], ["Rock Riot", "Stone Mask", "Gemma Torpor"], ["Fulgur", "Duplicator", "Tenebris Tonitrus"], ["Keremet Bubbles", "Armor", "Keremet Morbus"], ["Hex", "Skull O'Maniac", "Nightmare"], ["Refectio", "Clover", "Sanctuary"], ["Mace", "Hollow Heart", "Stamazza"], ["Star Flail", "Pummarola", "Moon Rod"], ["Alucard Spear", "Wings", "Thunderbolt Spear"], ["Trident", "Duplicator", "Gungnir-Souris"], ["Iron Shield", "Parm Aegis", "Dark Iron Shield"], ["Guardian's Targe", "Pummarola", "Sacred Beasts Tower Shield"], ["Tyrfing", "Spinach", "Rune Sword"], ["Alucart Sworb", "-", "Alucard Swords"], ["Alucard Swords", "6 passivos e evoluções", "Alucard Shield"], ["Confodere", "-", "Vol Confodere"], ["Vol Confodere", "-", "Melio Confodere"], ["Globus", "Empty Tome", "Nitesco"], ["Optical Shot", "Karoma's Mana", "Acerbatus"], ["Centralis Custos + Dextro Custos + Sinestro Custos", "-", "Trinum Custodem"], ["Dominus Agony + Dominus Anger + Dominus Hatred", "-", "Power of Sire"], ["Sonic Dash", "Wings", "Rapidus Fio"], ["Luminatio", "Crown", "Vol Luminatio"], ["Umbra", "Attractorb", "Vol Umbra"], ["Vol Luminatio + Vol Umbra", "-", "Universitas"], ["Endo Gears + Peri Pendulum + Myo Lift + Epi Head", "-", "Clock Tower"]]], "emerald": ["Emerald Diorama", [["Fleuret", "-", "Dress Sword"], ["Dress Sword", "-", "Espada Ropera"], ["Town Sword", "-", "Lordstar"], ["Lordstar", "-", "Dayblade"], ["Splashers", "Spellbinder", "Pursuant Blades"], ["Flamberge", "-", "Zweihander"], ["Zweihander", "-", "Galatyn"], ["Punch", "-", "Pressure Point"], ["Pressure Point", "-", "Gilded Hand"], ["Kick", "Pummarola", "Triable Kick"], ["Saber Machine Gun", "-", "Hecaton Machine Gun"], ["Hecaton Machine Gun", "-", const aliases={"NO FUTURE":"NO FUTURE","Skull O'Maniac":"Skull O'Maniac","Torrona's Box":"Torrona's Box","O'Sole":"O'Sole","Karoma's Mana":"Karoma's Mana"};
function iconUrl(name){name=name.trim(); if(!name||name==='-'||/nível|passivos|evoluções/i.test(name))return ''; name=name.split(' + ')[0].trim(); return 'https://vampire-survivors.fandom.com/wiki/Special:Redirect/file/'+encodeURIComponent('Sprite-'+(aliases[name]||name)+'.png');}
function item(name,cls=''){const url=iconUrl(name);return `<div class="item ${cls}"><div class="frame">${url?`<img loading="lazy" src="${url}" onerror="this.style.display='none'">`:'<span style="color:#887">—</span>'}</div><div class="name">${name}</div></div>`}
let current='base';const menu=document.getElementById('menu'),grid=document.getElementById('grid'),heading=document.getElementById('heading'),desc=document.getElementById('desc'),search=document.getElementById('search');
Object.entries(DATA).forEach(([k,[title,rows]])=>{let b=document.createElement('button');b.className='btn';b.dataset.k=k;b.innerHTML=`<span>${title}</span><span class="count">${rows.length}</span>`;b.onclick=()=>{current=k;search.value='';render()};menu.appendChild(b)});
function render(){document.querySelectorAll('.btn').forEach(b=>b.classList.toggle('active',b.dataset.k===current));let [title,rows]=DATA[current];let q=search.value.toLowerCase().trim();let filt=rows.filter(r=>r.join(' ').toLowerCase().includes(q));heading.textContent=title;desc.textContent=`${filt.length} combinação(ões) exibidas`;grid.innerHTML=filt.map(r=>`<article class="card"><span class="badge">${title}</span><div class="combo">${item(r[0])}<div class="op">+</div>${item(r[1])}<div class="op">=</div>${item(r[2],'evo')}</div></article>`).join('')||'<div class="empty">Nada encontrado.</div>'}
search.oninput=render;render();
</script></body></html>
